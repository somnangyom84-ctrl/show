<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PETS | Premium Pet Essentials</title>
    <!-- link bootstrap  -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <!-- link cdn  -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
   
</head>
<body>
<section class="py-5 bg-white">
  <div class="container">
    <div class="row align-items-center shadow rounded-4 overflow-hidden border">
      <div class="col-lg-5 d-none d-lg-block p-0">
        <img src="https://i.pinimg.com/736x/ea/17/e1/ea17e1e3ecdab76dac0d9aaa84966179.jpg" class="img-fluid h-100" style="object-fit: cover; min-height: 500px;" alt="Happy Dog">
      </div>
      
      <div class="col-lg-7 p-4 p-md-5">
        <h3 class="fw-bold mb-4">Create Your Pet's Profile 🐾</h3>
        <form action="/save-pet" method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <input type="text" class="form-control form-control-lg border-2" placeholder="Pet Name" required>
            </div>
            <div class="col-md-6">
              <select class="form-select form-select-lg border-2">
                <option selected>Species</option>
                <option>Dog</option>
                <option>Cat</option>
                <option>Bird</option>
              </select>
            </div>
            <div class="col-12">
              <input type="text" class="form-control form-control-lg border-2" placeholder="Pet Breed (e.g. Golden Retriever)">
            </div>
            <div class="col-md-12">
              <label class="form-label text-muted">Special Dietary Needs?</label>
              <textarea class="form-control border-2" rows="3" placeholder="Allergies, favorite treats, etc."></textarea>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow" style="background-color: #2e7d32;">
                JOIN THE PETS COMMUNITY
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
</body>
</html>
